<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scoutdle - Anime Guessing Game</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <style>
        :root {
            --green: #538d4e;
            --yellow: #b59f3b;
            --bg: #0b0b0b;
            --dark: #212121;
            --text: #ffffff;
            --glow: rgba(83, 141, 78, 0.6);
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            width: 100%;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .home-link {
            text-decoration: none;
            cursor: pointer;
        }

        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .title-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid var(--green);
            object-fit: cover;
        }

        .header-main {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--green);
            text-shadow: 0 0 10px var(--glow);
            letter-spacing: 2px;
            margin: 0;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            width: 100%;
            padding: 0 5px;
            box-sizing: border-box;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #888;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 12px;
            transition: 0.3s;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .nav-btn.active {
            color: var(--green);
            border-bottom: 2px solid var(--green);
        }

        .kofi-btn {
            background: var(--green);
            color: white;
            border-radius: 20px;
            padding: 8px 12px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- SEARCH BOX & DROPDOWN --- */
        .search-box {
            width: 100%;
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #333;
            background: #111;
            color: white;
            box-sizing: border-box;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            appearance: none;
        }

        #dropdown {
            position: absolute;
            width: 100%;
            background: #1a1a1a;
            z-index: 3000;
            border-radius: 12px;
            max-height: 500px;
            overflow-y: auto;
            display: none;
            border: 2px solid #444;
            margin-top: 8px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7);
        }

        .item {
            padding: 16px 20px;
            cursor: pointer;
            border-bottom: 1px solid #222;
            text-align: left;
            transition: background 0.2s;
        }

        .item:hover {
            background: #252525;
        }

        /* --- GAME CARDS --- */
        .char-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 12px;
            border: 1px solid #333;
            margin-bottom: 12px;
            width: 100%;
            box-sizing: border-box;
            animation: slideDown 0.4s ease-out;
        }

        .char-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .char-image {
            width: 50px;
            height: 70px;
            border-radius: 6px;
            object-fit: cover;
            background: #222;
            border: 1px solid #444;
        }

        .attr-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            perspective: 1000px;
        }

        .attr-box {
            background: #262626;
            padding: 6px 2px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.65rem;
            min-height: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: flipIn 0.6s ease-in-out forwards;
            backface-visibility: hidden;
            position: relative;
            color: white;
        }

        .attr-label {
            font-size: 0.5rem;
            color: white;
            opacity: 0.8;
            text-transform: uppercase;
            margin-bottom: 1px;
        }

        .arrow {
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 2px;
        }

        /* --- LAYOUT SECTIONS --- */
        .view-section {
            display: none;
            width: 92%;
            max-width: 600px;
            padding: 15px 0;
        }

        .view-section.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .archive-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .archive-table th {
            background: #222;
            color: var(--green);
            padding: 10px;
            text-align: left;
            font-size: 0.75rem;
        }

        .archive-table td {
            padding: 10px;
            border-bottom: 1px solid #333;
            font-size: 0.85rem;
        }

        .archive-table tr.hidden {
            display: none;
        }

        .menu-btn {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        /* --- ANIMATIONS --- */
        @keyframes flipIn {
            0% {
                transform: rotateX(0deg);
            }

            45% {
                transform: rotateX(90deg);
            }

            100% {
                transform: rotateX(0deg);
            }
        }

        @keyframes flipInGreen {
            0% {
                transform: rotateX(0deg);
            }

            55% {
                background: var(--green);
            }

            100% {
                transform: rotateX(0deg);
                background: var(--green);
            }
        }

        @keyframes flipInYellow {
            0% {
                transform: rotateX(0deg);
            }

            55% {
                background: var(--yellow);
            }

            100% {
                transform: rotateX(0deg);
                background: var(--yellow);
            }
        }

        .attr-box.green {
            animation-name: flipInGreen;
        }

        .attr-box.yellow {
            animation-name: flipInYellow;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .header-main {
                font-size: 1.5rem;
            }

            .attr-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            #dropdown {
                max-height: 400px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a onclick="resetToHome()" class="home-link">
            <div class="title-container">
                <img src="Scoutdle.jpeg" class="title-logo" alt="Logo">
                <h1 class="header-main">SCOUTDLE</h1>
            </div>
        </a>
        <div class="nav-buttons">
            <button class="nav-btn active" id="play-nav" onclick="showSection('game-view', this)">Play</button>
            <button class="nav-btn" onclick="showSection('archive-view', this)">Archive</button>
            <button class="nav-btn" onclick="showSection('stats-view', this)">Stats</button>
            <a href="https://ko-fi.com/A4853SSA" target="_blank" class="kofi-btn">☕ Support</a>
        </div>
    </nav>

    <div id="game-view" class="view-section active">
        <div id="start-screen"
            style="text-align:center; background: var(--card-bg); padding: 30px 15px; border-radius: 20px; border:1px solid #333; width: 100%; box-sizing: border-box;">
            <h2 id="loading-msg" style="color: var(--green);">Accessing Data...</h2>
            <div id="menu-options" style="display:none;">
                <button class="menu-btn" style="background: var(--green); color: #000;"
                    onclick="startGame('daily')">Daily Challenge</button>
                <button class="menu-btn" style="background:#333; color:white;"
                    onclick="startGame('unlimited')">Unlimited Mode</button>
            </div>
        </div>

        <div id="game-content" style="display:none; width:100%;">
            <div id="end-actions"></div>
            <div id="guess-counter"
                style="text-align:center; margin-bottom:12px; font-weight: bold; color: var(--green); font-size: 0.9rem;">
                Guesses: 0 / 10</div>
            <div class="search-box">
                <input type="text" id="guessInput" placeholder="Character or Anime..." autocomplete="off">
                <div id="dropdown"></div>
            </div>
            <div id="gameGrid"></div>
        </div>
    </div>

    <div id="archive-view" class="view-section">
        <h2 style="color: var(--green); margin-bottom: 15px; font-size: 1.4rem;">Character Archive</h2>
        <input type="text" id="archiveSearch" placeholder="Search series or name..." onkeyup="filterArchive()"
            style="margin-bottom: 10px;">
        <table class="archive-table" id="archiveTable">
            <thead>
                <tr>
                    <th>Series</th>
                    <th>Character</th>
                </tr>
            </thead>
            <tbody id="archiveBody"></tbody>
        </table>
    </div>

    <div id="stats-view" class="view-section">
        <h2 style="color: var(--green); font-size: 1.4rem;">Stats</h2>
        <div id="stats-container"
            style="text-align:center; background: var(--card-bg); padding: 20px; border-radius: 15px; width: 100%; box-sizing: border-box;">
            <p id="total-wins" style="color: #fff; margin: 5px 0;">Daily Wins: 0</p>
        </div>
    </div>

    <script>
        let characters = [], secretChar = null, fuse = null, guesses = [], gameOver = false, currentMode = 'daily';

        async function fetchImage(id, retries = 2) {
            if (!id || isNaN(id)) return "Scoutdle.jpeg";
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(`https://api.jikan.moe/v4/characters/${id}`);
                    if (res.ok) {
                        const data = await res.json();
                        return data.data?.images?.jpg?.image_url || "Scoutdle.jpeg";
                    }
                    if (res.status === 429) await new Promise(r => setTimeout(r, 1000));
                } catch (e) { }
            }
            return "Scoutdle.jpeg";
        }

        function resetToHome() {
            gameOver = false; guesses = [];
            document.getElementById('game-content').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
            document.getElementById('gameGrid').innerHTML = '';
            document.getElementById('end-actions').innerHTML = '';
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            showSection('game-view', document.getElementById('play-nav'));
        }

        async function init() {
            Papa.parse("anime.csv", {
                download: true, header: false, skipEmptyLines: true,
                complete: function (results) {
                    characters = results.data.map(r => {
                        let sName = r[1]?.trim() || "???";
                        if (sName === "FMA: B") sName = "Full Metal Alchemist Brotherhood";
                        return {
                            "Name": r[0]?.trim(), "Series": sName, "Age": r[2]?.trim(),
                            "Height": r[3]?.trim(), "Sex": r[4]?.trim(), "Hair": r[5]?.trim(),
                            "Eyes": r[6]?.trim(), "ID": r[7]?.trim(), "Genre": r[8]?.trim() || "???",
                            "Year": r[9]?.trim() || "????"
                        };
                    }).filter(c => c.Name && c.Name.toLowerCase() !== "name");

                    fuse = new Fuse(characters, { keys: ['Name', 'Series'], threshold: 0.35 });
                    populateArchive();
                    document.getElementById('loading-msg').style.display = "none";
                    document.getElementById('menu-options').style.display = 'block';
                    updateStats();
                }
            });
        }

        function populateArchive() {
            const archiveBody = document.getElementById('archiveBody');
            const sortedChars = [...characters].sort((a, b) => {
                if (a.Series === b.Series) return a.Name.localeCompare(b.Name);
                return a.Series.localeCompare(b.Series);
            });
            archiveBody.innerHTML = sortedChars.map(c => `<tr><td style="color:#888;">${c.Series}</td><td><a href="https://myanimelist.net/character/${c.ID}" target="_blank" class="archive-link"><strong>${c.Name}</strong></a></td></tr>`).join('');
        }

        function filterArchive() {
            const filter = document.getElementById("archiveSearch").value.toLowerCase();
            const rows = document.getElementById("archiveBody").getElementsByTagName("tr");
            for (let row of rows) row.classList.toggle("hidden", !row.textContent.toLowerCase().includes(filter));
        }

        function startGame(mode) {
            currentMode = mode;
            gameOver = false; guesses = [];
            document.getElementById('gameGrid').innerHTML = '';
            document.getElementById('end-actions').innerHTML = '';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'block';
            document.getElementById('guessInput').disabled = false;

            const today = new Date().toISOString().split('T')[0];
            if (mode === 'daily') {
                secretChar = getDailyChar(today);
                loadProgress(today);
            } else {
                secretChar = characters[Math.floor(Math.random() * characters.length)];
            }
            setupSearch();
            document.getElementById('guess-counter').innerText = `Guesses: ${guesses.length} / 10`;
        }

        // --- UPDATED: SFC32 Chaotic Daily Picker ---
        function getDailyChar(dateString) {
            let seed = 0;
            for (let i = 0; i < dateString.length; i++) {
                seed = ((seed << 5) - seed) + dateString.charCodeAt(i);
                seed |= 0;
            }
            // Small Fast Chaotic (SFC32) PRNG
            let a = seed | 0, b = 0x9e3779b9 | 0, c = 0x12345678 | 0, d = 0xdeadbeef | 0;
            for (let i = 0; i < 20; i++) {
                a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
                let t = (a + b | 0) + d | 0;
                d = d + 1 | 0;
                a = b ^ b >>> 9;
                b = c + (c << 3) | 0;
                c = (c << 21 | c >>> 11);
                c = c + t | 0;
            }
            return characters[Math.abs(c) % characters.length];
        }

        function saveProgress() {
            if (currentMode !== 'daily') return;
            const today = new Date().toISOString().split('T')[0];
            const data = { date: today, guesses: guesses.map(g => g.Name), gameOver: gameOver };
            localStorage.setItem('scoutdle_daily', JSON.stringify(data));
        }

        async function loadProgress(today) {
            const saved = localStorage.getItem('scoutdle_daily');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.date === today) {
                    for (const name of data.guesses) {
                        const char = characters.find(c => c.Name === name);
                        if (char) { guesses.push(char); await renderGuessCard(char); }
                    }
                    if (data.gameOver) {
                        const last = guesses[guesses.length - 1];
                        endGame(last.Name === secretChar.Name ? "✨ Victory! It was " + secretChar.Name : "💀 Game Over! It was " + secretChar.Name, false);
                    }
                } else localStorage.removeItem('scoutdle_daily');
            }
        }

        function setupSearch() {
            const input = document.getElementById('guessInput');
            const dropdown = document.getElementById('dropdown');
            input.oninput = () => {
                const res = fuse.search(input.value).slice(0, 20);
                dropdown.innerHTML = res.map(r => `<div class="item" onclick="selectGuess('${r.item.Name}')"><strong style="color:var(--green);">${r.item.Name}</strong><br><small style="color:#888;">${r.item.Series}</small></div>`).join('');
                dropdown.style.display = res.length > 0 ? 'block' : 'none';
            };
        }

        async function selectGuess(name) {
            const char = characters.find(c => c.Name === name);
            if (!char || gameOver || guesses.some(g => g.Name === name)) return;
            document.getElementById('guessInput').value = '';
            document.getElementById('dropdown').style.display = 'none';
            guesses.push(char);
            document.getElementById('guess-counter').innerText = `Guesses: ${guesses.length} / 10`;
            await renderGuessCard(char);

            if (char.Name === secretChar.Name) {
                if (currentMode === 'daily') saveWin();
                endGame("✨ Victory! It was " + secretChar.Name);
            } else if (guesses.length >= 10) endGame("💀 Game Over! It was " + secretChar.Name);
            else saveProgress();
        }

        function saveWin() {
            let wins = parseInt(localStorage.getItem('scoutdle_wins') || '0');
            localStorage.setItem('scoutdle_wins', wins + 1);
            updateStats();
        }

        function updateStats() {
            document.getElementById('total-wins').innerText = `Daily Wins: ${localStorage.getItem('scoutdle_wins') || '0'}`;
        }

        function endGame(msg, shouldSave = true) {
            gameOver = true;
            document.getElementById('guessInput').disabled = true;
            if (shouldSave) saveProgress();
            document.getElementById('end-actions').innerHTML = `
                <div style="margin-bottom:20px; padding:20px; background:#222; border-radius:15px; border: 2px solid var(--green);">
                    <h3 style="margin-top:0;">${msg}</h3>
                    <button class="menu-btn" style="background:var(--green); color:black; margin-bottom:10px;" onclick="shareResult()">Share Result 📊</button>
                    <button class="menu-btn" style="background:#444; color:white;" onclick="resetToHome()">Back to Menu</button>
                </div>`;
        }

        function shareResult() {
            const today = new Date().toISOString().split('T')[0];
            let grid = `${currentMode === 'daily' ? 'Scoutdle Daily' : 'Scoutdle Unlimited'} (${today}) ${guesses.length}/10\n`;
            guesses.forEach(g => {
                let row = "";
                ["Series", "Genre", "Year", "Sex", "Age", "Height", "Hair", "Eyes"].forEach(k => {
                    const val = g[k], target = secretChar[k];
                    if (val?.toLowerCase() === target?.toLowerCase()) row += "🟩";
                    else if (!isNaN(parseInt(val)) && Math.abs(parseInt(val) - parseInt(target)) <= (k === "Height" ? 10 : 5)) row += "🟨";
                    else row += "⬛";
                });
                grid += row + "\n";
            });
            const text = `${grid}\nPlay at: http://scoutdle.com/`;
            if (navigator.share) navigator.share({ title: 'Scoutdle', text: text }).catch(() => copyToClip(text));
            else copyToClip(text);
        }

        function copyToClip(text) {
            navigator.clipboard.writeText(text).then(() => alert("Results copied to clipboard! 📋"));
        }

        async function renderGuessCard(guess) {
            const grid = document.getElementById('gameGrid');
            const card = document.createElement('div');
            card.className = 'char-card';
            const imgUrl = await fetchImage(guess.ID);
            const attrHtml = ["Series", "Genre", "Year", "Sex", "Age", "Height", "Hair", "Eyes"].map((k, i) => {
                const val = guess[k], target = secretChar[k];
                let cls = '', arr = '';
                if (val?.toLowerCase() === target?.toLowerCase()) cls = 'green';
                else if (!isNaN(parseInt(val)) && !isNaN(parseInt(target))) {
                    if (Math.abs(parseInt(val) - parseInt(target)) <= (k === "Height" ? 10 : 5)) cls = 'yellow';
                    arr = parseInt(val) < parseInt(target) ? ' ↑' : ' ↓';
                }
                return `<div class="attr-box ${cls}" style="animation-delay:${i * 0.1}s"><span class="attr-label">${k}</span><span><b>${val}${arr}</b></span></div>`;
            }).join('');
            card.innerHTML = `<div class="char-header"><img src="${imgUrl}" class="char-image" onerror="this.src='Scoutdle.jpeg'"><div><strong style="color:var(--green); font-size:1.1rem;">${guess.Name}</strong><br><small style="color:#888;">${guess.Series}</small></div></div><div class="attr-grid">${attrHtml}</div>`;
            grid.prepend(card);
        }

        function showSection(id, btn) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
        window.onload = init;
    </script>
</body>

</html>
