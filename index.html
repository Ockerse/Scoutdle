<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoutdle - Anime Guessing Game</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <style>
        :root {
            --green: #538d4e;
            --yellow: #b59f3b;
            --bg: #0b0b0b;
            --dark: #212121;
            --text: #ffffff;
            --blue: #00ccff;
            --red: #ff4d4d;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            min-height: 100vh;
        }

        /* --- ANIMATIONS --- */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes flipReveal {
            0% { transform: rotateX(90deg); opacity: 0; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        @keyframes victoryGlow {
            0% { box-shadow: 0 0 5px var(--green); }
            50% { box-shadow: 0 0 20px var(--green); }
            100% { box-shadow: 0 0 5px var(--green); }
        }

        /* --- HEADER --- */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
        }

        .header-logo {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,204,255,0.3);
        }

        .header {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- MENUS --- */
        #start-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .menu-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 25px;
            border: 1px solid #333;
            text-align: center;
            width: 90%;
            max-width: 400px;
            animation: popIn 0.5s ease-out;
        }

        .menu-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        .menu-btn:hover { filter: brightness(1.2); }
        .menu-btn:active { transform: scale(0.98); }
        .daily-btn { background: var(--blue); color: #000; }
        .unlimited-btn { background: #333; color: #fff; }

        /* --- SEARCH --- */
        .search-box {
            position: sticky;
            top: 10px;
            width: 100%;
            max-width: 500px;
            z-index: 1000;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 15px;
            border: 2px solid #333;
            background: #111;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--blue);
        }

        #dropdown {
            position: absolute;
            top: 110%;
            width: 100%;
            background: #1a1a1a;
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #444;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        .item:hover { background: #262626; }

        /* --- GAME CARDS --- */
        .guess-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }

        .char-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 12px;
            border: 1px solid #333;
            animation: popIn 0.4s ease-out forwards;
        }

        .char-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .char-thumb {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
        }

        .attr-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .attr-box {
            padding: 6px 2px;
            border-radius: 6px;
            background: #262626;
            text-align: center;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            min-height: 45px;
            justify-content: center;
            opacity: 0;
        }

        .attr-box.animate {
            animation: flipReveal 0.5s ease forwards;
        }

        .attr-label {
            font-size: 0.55rem;
            opacity: 0.7;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .attr-val { font-weight: bold; word-break: break-word; }
        .green { background-color: var(--green) !important; }
        .yellow { background-color: var(--yellow) !important; color: black; }
        .winner { animation: victoryGlow 2s infinite !important; border: 1px solid var(--green) !important; }

        /* --- OVERLAYS --- */
        #status-area {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            z-index: 4000;
            text-align: center;
            width: 85%;
            max-width: 350px;
            display: none;
            border: 2px solid var(--blue);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            z-index: 3500;
        }

        #view-board-float {
            position: fixed;
            bottom: 25px;
            display: none;
            z-index: 2500;
            animation: popIn 0.3s ease-out;
        }

        .float-btn {
            background: var(--blue);
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,204,255,0.4);
        }
    </style>
</head>

<body>

    <div id="start-screen">
        <div class="menu-card">
            <h1>SCOUTDLE</h1>
            <p id="loading-msg">Fetching Character Archive...</p>
            <div id="menu-options" style="display:none;">
                <button class="menu-btn daily-btn" id="daily-btn-text" onclick="startGame('daily')">Daily Challenge</button>
                <button class="menu-btn unlimited-btn" onclick="startGame('unlimited')">Unlimited Mode</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    
    <div id="status-area">
        <h2 id="status-msg"></h2>
        <p id="stats-msg"></p>
        <button class="menu-btn daily-btn" onclick="share()">SHARE RESULTS</button>
        <button class="menu-btn" style="background: #444; color: white;" onclick="toggleResults(false)">VIEW BOARD</button>
        <button class="menu-btn unlimited-btn" onclick="location.reload()">MAIN MENU</button>
    </div>

    <div id="view-board-float">
        <button class="float-btn" onclick="toggleResults(true)">Back to Stats</button>
    </div>

    <div class="header-container">
        <img src="Scoutdle.jpeg" class="header-logo" alt="Logo" onerror="this.style.display='none'">
        <div class="header">SCOUTDLE</div>
    </div>

    <div id="guess-counter">Guesses: 0 / 10</div>

    <div id="hint-box" style="margin: 10px 0;">
        <button id="hint-btn" class="menu-btn yellow" style="width:auto; padding: 8px 20px; display:none;" onclick="revealHint()">GET A HINT</button>
        <div id="hint-text" style="color: var(--yellow); font-size: 0.9rem; margin-top: 5px; font-weight: bold; text-align: center;"></div>
    </div>

    <div class="search-box">
        <input type="text" id="guessInput" placeholder="Character name..." autocomplete="off">
        <div id="dropdown"></div>
    </div>

    <div id="gameGrid" class="guess-container"></div>

    <script>
        let characters = [], secretChar = null, fuse = null, guesses = [], gameOver = false;
        let gameMode = 'daily', hintsGiven = 0;

        function seededRandom(seed) {
            return function() {
                let t = seed += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        async function init() {
            Papa.parse("anime.csv", {
                download: true, header: false, skipEmptyLines: true,
                complete: function (results) {
                    characters = results.data.map(r => ({
                        "Name": r[0]?.trim(), "Series": r[1]?.trim(), "Age": r[2]?.trim(),
                        "Height": r[3]?.trim(), "Sex": r[4]?.trim(), "Hair": r[5]?.trim(),
                        "Eyes": r[6]?.trim(), "ID": r[7]?.trim(), "Genre": r[8]?.trim() || "???",
                        "Year": r[9]?.trim() || "????"
                    })).filter(c => c.Name && c.Name.toLowerCase() !== "name");

                    fuse = new Fuse(characters, { 
                        keys: [{ name: 'Name', weight: 2 }, { name: 'Series', weight: 0.5 }], 
                        threshold: 0.35 
                    });

                    checkDailyStatus();
                    document.getElementById('loading-msg').innerText = "Archive Sync Complete.";
                    document.getElementById('menu-options').style.display = 'block';
                }
            });
        }

        function getDailyKey() {
            const now = new Date();
            return `scoutdle_${now.getUTCFullYear()}_${now.getUTCMonth() + 1}_${now.getUTCDate()}`;
        }

        function checkDailyStatus() {
            const saved = localStorage.getItem(getDailyKey());
            if (saved) {
                const data = JSON.parse(saved);
                const btn = document.getElementById('daily-btn-text');
                btn.innerText = data.finished ? "Daily Completed ✓" : "Continue Daily Challenge";
            }
        }

        async function startGame(mode) {
            gameMode = mode;
            const now = new Date();
            const dateSeed = parseInt(now.getUTCFullYear().toString() + 
                             (now.getUTCMonth() + 1).toString().padStart(2, '0') + 
                             now.getUTCDate().toString().padStart(2, '0'));
            
            guesses = [];
            gameOver = false;
            document.getElementById('gameGrid').innerHTML = '';
            document.getElementById('hint-text').innerHTML = '';
            document.querySelector('.search-box').style.display = 'block';
            
            if (mode === 'daily') {
                const rng = seededRandom(dateSeed);
                const randomIndex = Math.floor(rng() * characters.length);
                secretChar = characters[randomIndex];

                const saved = localStorage.getItem(getDailyKey());
                if (saved) {
                    const data = JSON.parse(saved);
                    document.getElementById('start-screen').style.display = 'none';
                    hintsGiven = data.hintsGiven || 0;
                    if (hintsGiven > 0) renderHints();
                    
                    for (let g of data.guesses) { 
                        await submitGuess(g, true); 
                    }
                    
                    if (data.finished) {
                        const lastGuess = guesses[guesses.length - 1];
                        const won = lastGuess && lastGuess.Name.toLowerCase() === secretChar.Name.toLowerCase();
                        gameOver = true;
                        endGame(won);
                    }
                    setupSearch();
                    return;
                }
            } else {
                secretChar = characters[Math.floor(Math.random() * characters.length)];
            }
            document.getElementById('start-screen').style.display = 'none';
            setupSearch();
        }

        function setupSearch() {
            const input = document.getElementById('guessInput');
            const dropdown = document.getElementById('dropdown');
            input.addEventListener('input', () => {
                if (gameOver) return;
                const val = input.value.trim();
                const results = fuse.search(val).slice(0, 10);
                dropdown.innerHTML = '';
                if (val.length >= 1 && results.length > 0) {
                    dropdown.style.display = 'block';
                    results.forEach(r => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `<strong>${r.item.Name}</strong><br><small style="color:#888;">${r.item.Series}</small>`;
                        div.onclick = () => { 
                            submitGuess(r.item); 
                            input.value = ''; 
                            dropdown.style.display = 'none'; 
                        };
                        dropdown.appendChild(div);
                    });
                } else dropdown.style.display = 'none';
            });
        }

        async function submitGuess(charObj, isRestoring = false) {
            if (gameOver && !isRestoring) return;

            if (!isRestoring) {
                guesses.push(charObj);
                saveProgress();
            } else {
                if (!guesses.some(g => g.Name === charObj.Name)) {
                    guesses.push(charObj);
                }
            }
            
            document.getElementById('guess-counter').innerText = `Guesses: ${guesses.length} / 10`;
            
            if (guesses.length >= 3 && hintsGiven < 3) {
                document.getElementById('hint-btn').style.display = 'block';
            }

            let img = 'https://via.placeholder.com/50/222/fff?text=?';
            
            if (charObj.ID && !isRestoring) {
                try {
                    const resp = await fetch(`https://api.jikan.moe/v4/characters/${charObj.ID}`);
                    const data = await resp.json();
                    img = data.data?.images?.jpg?.image_url || img;
                } catch (e) { console.log("Image load failed"); }
            }

            renderCard(charObj, img, isRestoring);

            const win = charObj.Name.toLowerCase() === secretChar.Name.toLowerCase();
            if (win || guesses.length >= 10) {
                gameOver = true;
                if (!isRestoring) {
                    saveProgress(true);
                    setTimeout(() => endGame(win), 1500);
                }
            }
        }

        function renderCard(guess, img, isRestoring) {
            const grid = document.getElementById('gameGrid');
            const card = document.createElement('div');
            card.className = 'char-card';
            
            const win = guess.Name.toLowerCase() === secretChar.Name.toLowerCase();
            if (win) card.classList.add('winner');

            const keys = ["Series", "Genre", "Year", "Age", "Height", "Sex", "Hair", "Eyes"];
            
            const html = keys.map((k, index) => {
                let status = '', val = guess[k], target = secretChar[k];
                if (val.toLowerCase() === target.toLowerCase()) status = 'green';
                else if (['Year', 'Age', 'Height'].includes(k)) {
                    const gN = parseInt(val), tN = parseInt(target);
                    if (!isNaN(gN) && !isNaN(tN)) {
                        if (Math.abs(gN - tN) <= (k === 'Height' ? 10 : 5)) status = 'yellow';
                        val += gN < tN ? " ↑" : " ↓";
                    }
                }
                
                const delay = isRestoring ? '0s' : `${index * 0.1}s`;
                return `
                    <div class="attr-box ${status} animate" style="animation-delay: ${delay}">
                        <span class="attr-label">${k}</span>
                        <span class="attr-val">${val}</span>
                    </div>`;
            }).join('');

            card.innerHTML = `
                <div class="char-header">
                    <img src="${img}" class="char-thumb">
                    <strong>${guess.Name}</strong>
                </div>
                <div class="attr-grid">${html}</div>`;
            
            grid.prepend(card);
        }

        function saveProgress(finished = false) {
            if (gameMode !== 'daily') return;
            localStorage.setItem(getDailyKey(), JSON.stringify({ 
                guesses, 
                finished, 
                hintsGiven 
            }));
        }

        function revealHint() {
            hintsGiven++;
            renderHints();
            saveProgress(gameOver);
        }

        function renderHints() {
            const h = document.getElementById('hint-text');
            let content = "";
            if (hintsGiven >= 1) content += `HINT 1: Released in ${secretChar.Year}`;
            if (hintsGiven >= 2) content += `<br>HINT 2: Genre is ${secretChar.Genre}`;
            if (hintsGiven >= 3) {
                content += `<br>HINT 3: From the series "${secretChar.Series}"`;
                document.getElementById('hint-btn').style.display = 'none';
            }
            h.innerHTML = content;
        }

        function endGame(won) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('status-area').style.display = 'block';
            document.getElementById('status-msg').innerText = won ? "VICTORY!" : "DEFEAT";
            document.getElementById('status-msg').style.color = won ? 'var(--green)' : 'var(--red)';
            document.getElementById('stats-msg').innerText = `Target: ${secretChar.Name} (${secretChar.Series})`;
            document.querySelector('.search-box').style.display = 'none';
            document.getElementById('hint-btn').style.display = 'none';
        }

        function toggleResults(show) {
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
            document.getElementById('status-area').style.display = show ? 'block' : 'none';
            document.getElementById('view-board-float').style.display = show ? 'none' : 'block';
        }

        function share() {
            const won = guesses[guesses.length-1].Name.toLowerCase() === secretChar.Name.toLowerCase();
            const score = won ? guesses.length : 'X';
            const text = `Scoutdle ${gameMode.toUpperCase()} ${score}/10\nhttps://scoutdle.vercel.app`;
            navigator.clipboard.writeText(text);
            alert("Score copied to clipboard!");
        }

        window.onload = init;
    </script>
</body>
</html>
