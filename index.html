<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scoutdle - Anime Guessing Game</title>

    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <a onclick="resetToHome()" class="home-link">
            <div class="title-container">
                <img src="Scoutdle.jpeg" class="title-logo" alt="Logo" onerror="this.style.display='none'">
                <h1 class="header-main">SCOUTDLE</h1>
            </div>
        </a>
        <div class="nav-buttons">
            <button class="nav-btn active" id="play-nav" onclick="showSection('game-view', this)">Play</button>
            <button class="nav-btn" onclick="showSection('archive-view', this)">Archive</button>
            <button class="nav-btn" onclick="showSection('stats-view', this)">Stats</button>
            <a href="https://ko-fi.com/A4853SSA" target="_blank" class="kofi-btn">☕ Support</a>
        </div>
    </nav>

    <div id="game-view" class="view-section active">
        <div id="start-screen"
            style="text-align:center; background: var(--card-bg); padding: 30px 15px; border-radius: 20px; border:1px solid #333; width: 100%; box-sizing: border-box;">
            <h2 id="loading-msg" style="color: var(--green);">Accessing Data...</h2>
            <div id="menu-options" style="display:none;">
                <button class="menu-btn" style="background: var(--green); color: #000;"
                    onclick="startGame('daily')">Daily Challenge</button>
                <button class="menu-btn" style="background:#333; color:white;"
                    onclick="startGame('unlimited')">Unlimited Mode</button>
            </div>
        </div>

        <div id="game-content" style="display:none; width:100%;">
            <div id="end-actions"></div>

            <div id="hint-container" style="text-align:center; margin-bottom: 15px; min-height: 50px;">
                <button id="hint-btn" class="menu-btn"
                    style="display:none; background: var(--orange); color: white; width: auto; padding: 10px 25px; font-size: 0.85rem; border-radius: 30px; box-shadow: 0 4px 10px rgba(206, 125, 43, 0.3);"
                    onclick="revealHint()">
                    Unlock Hint 💡
                </button>
                <div id="hint-text"
                    style="margin-top: 10px; color: var(--yellow); font-weight: bold; font-size: 0.9rem; min-height: 1.2rem;">
                </div>
            </div>

            <div id="guess-counter"
                style="text-align:center; margin-bottom:12px; font-weight: bold; color: var(--green); font-size: 0.9rem;">
                Guesses: 0 / 10</div>

            <div class="search-box">
                <input type="text" id="guessInput" placeholder="Character or Anime..." autocomplete="off">
                <div id="dropdown"></div>
            </div>
            <div id="gameGrid"></div>
        </div>

        <div id="daily-dashboard-meta" class="daily-meta-container" style="display: none;">
            <div class="daily-meta-split">
                <div class="meta-sub-block" id="yesterday-meta-card">
                    <span class="meta-caption">Yesterday's Answer</span>
                    <img id="yesterday-char-img" class="yesterday-avatar" src="Scoutdle.jpeg" alt="Yesterday's Character">
                    <strong id="yesterday-char-name" style="color: var(--green); font-size: 0.95rem;">-</strong>
                    <small id="yesterday-char-series" style="color: #aaa; font-size: 0.75rem;">-</small>
                </div>
                <div class="meta-sub-block">
                    <span class="meta-caption">Next Character In</span>
                    <span id="meta-timer-countdown" class="meta-countdown-timer">00:00:00</span>
                </div>
            </div>
        </div>
    </div>

    <div id="archive-view" class="view-section">
        <h2 style="color: var(--green); margin-bottom: 15px; font-size: 1.4rem;">Character Archive</h2>
        <input type="text" id="archiveSearch" placeholder="Search series or name..." onkeyup="filterArchive()"
            style="margin-bottom: 10px;">
        <table class="archive-table" id="archiveTable">
            <thead>
                <tr>
                    <th>Series</th>
                    <th>Character</th>
                </tr>
            </thead>
            <tbody id="archiveBody"></tbody>
        </table>
    </div>

    <div id="stats-view" class="view-section">
        <h2 style="color: var(--green); font-size: 1.4rem;">Statistics</h2>
        <div id="stats-container"
            style="background: var(--card-bg); padding: 20px; border-radius: 15px; width: 100%; box-sizing: border-box; text-align: center;">
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
