<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoutdle - Anime Guessing Game</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <style>
        :root {
            --green: #538d4e;
            --yellow: #b59f3b;
            --bg: #000000;
            --dark: #212121;
            --text: #ffffff;
            --blue: #00ccff;
            --red: #ff4d4d;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            min-height: 100vh;
        }

        /* --- ANIMATIONS --- */
        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes flip {
            0% {
                transform: rotateX(0);
            }

            45% {
                transform: rotateX(90deg);
                opacity: 0.5;
            }

            55% {
                transform: rotateX(90deg);
                opacity: 0.5;
            }

            100% {
                transform: rotateX(0);
                opacity: 1;
            }
        }

        /* --- HEADER --- */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 5px 0;
        }

        .header-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }

        .header {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin: 0;
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .menu-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid #333;
            max-width: 350px;
            width: 85%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .menu-btn {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
            text-transform: uppercase;
        }

        .daily-btn {
            background: var(--blue);
            color: #000;
        }

        .unlimited-btn {
            background: #333;
            color: #fff;
            border: 1px solid #444;
        }

        /* --- SEARCH DROPDOWN --- */
        #dropdown {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-radius: 15px;
            z-index: 1000;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #333;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: popIn 0.2s ease-out forwards;
        }

        .item:hover {
            background: #222;
        }

        /* --- GAME CARDS --- */
        .guess-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            padding-bottom: 40px;
        }

        .char-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #222;
            animation: popIn 0.4s ease-out;
        }

        .char-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .char-thumb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            background: #333;
        }

        .char-name {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .attr-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .attr-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            background: #262626;
            text-align: center;
            transform-style: preserve-3d;
            animation: flip 0.6s ease-in-out forwards;
        }

        .attr-label {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .attr-val {
            font-weight: 700;
            line-height: 1.1;
        }

        .green {
            background-color: var(--green) !important;
        }

        .yellow {
            background-color: var(--yellow) !important;
        }

        /* --- UI ELEMENTS --- */
        .search-box {
            position: sticky;
            top: 10px;
            z-index: 1000;
            width: 100%;
            max-width: 480px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px 24px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #111;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        #guess-counter {
            color: #888;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        #hint-box {
            width: 100%;
            max-width: 480px;
            text-align: center;
            margin-bottom: 15px;
            min-height: 50px;
        }

        #hint-btn {
            background: var(--yellow);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            display: none;
            margin: 0 auto;
        }

        #hint-text {
            color: var(--yellow);
            font-weight: bold;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        #status-area {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 25px;
            z-index: 4000;
            text-align: center;
            width: 80%;
            max-width: 350px;
            display: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3500;
            display: none;
        }

        .share-btn {
            background: var(--green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="start-screen">
        <div class="menu-card">
            <h1>SCOUTDLE</h1>
            <p id="loading-msg">Loading Anime Data...</p>
            <div id="menu-options" style="display:none;">
                <button class="menu-btn daily-btn" onclick="startGame('daily')">Daily Challenge</button>
                <button class="menu-btn unlimited-btn" onclick="startGame('unlimited')">Unlimited Mode</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="status-area">
        <h2 id="status-msg"></h2>
        <p id="stats-msg"></p>
        <button class="share-btn" onclick="share()">SHARE RESULTS</button>
        <button class="menu-btn unlimited-btn" onclick="location.reload()">MAIN MENU</button>
    </div>

    <div class="header-container">
        <img src="Scoutdle.jpeg" class="header-logo" alt="" onerror="this.style.display='none'">
        <div class="header">SCOUTDLE</div>
    </div>

    <div id="guess-counter">Guess 0 of 10</div>

    <div id="hint-box">
        <button id="hint-btn" onclick="revealHint()">GET A HINT</button>
        <div id="hint-text"></div>
    </div>

    <div class="search-box">
        <input type="text" id="guessInput" placeholder="Search character..." autocomplete="off">
        <div id="dropdown"></div>
    </div>

    <div id="gameGrid" class="guess-container"></div>

    <script>
        let characters = [], secretChar = null, fuse = null, guesses = [], gameOver = false;
        let gameMode = 'daily', hintsGiven = 0;

        async function init() {
            Papa.parse("anime.csv", {
                download: true, header: false, skipEmptyLines: true,
                complete: function (results) {
                    characters = results.data.map(r => ({
                        "Name": r[0]?.trim(), "Series": r[1]?.trim(), "Age": r[2]?.trim(),
                        "Height": r[3]?.trim(), "Sex": r[4]?.trim(), "Hair": r[5]?.trim(),
                        "Eyes": r[6]?.trim(), "ID": r[7]?.trim(), "Genre": r[8]?.trim() || "Unknown",
                        "Year": r[9]?.trim() || "????"
                    })).filter(c => c.Name && c.Name.toLowerCase() !== "name");

                    fuse = new Fuse(characters, { keys: ['Name', 'Series'], threshold: 0.3 });
                    document.getElementById('loading-msg').innerText = "Data Synced.";
                    document.getElementById('menu-options').style.display = 'block';
                }
            });
        }

        function startGame(mode) {
            gameMode = mode;
            document.getElementById('start-screen').style.display = 'none';
            if (mode === 'daily') {
                const now = new Date();
                const seed = parseInt(now.getUTCFullYear().toString() + (now.getUTCMonth() + 1) + now.getUTCDate());
                secretChar = characters[seed % characters.length];
            } else {
                secretChar = characters[Math.floor(Math.random() * characters.length)];
            }
            setupSearch();
        }

        function revealHint() {
            hintsGiven++;
            const hDisplay = document.getElementById('hint-text');
            if (hintsGiven === 1) hDisplay.innerText = `HINT 1: Released in ${secretChar.Year}`;
            else if (hintsGiven === 2) hDisplay.innerText = `HINT 2: Genre is ${secretChar.Genre}`;
            else if (hintsGiven === 3) {
                hDisplay.innerText = `HINT 3: From the series "${secretChar.Series}"`;
                document.getElementById('hint-btn').style.display = 'none';
            }
        }

        function setupSearch() {
            const input = document.getElementById('guessInput'), dropdown = document.getElementById('dropdown');
            input.addEventListener('input', () => {
                if (gameOver) return;
                const results = fuse.search(input.value);
                dropdown.innerHTML = '';
                if (input.value.length > 0 && results.length > 0) {
                    dropdown.style.display = 'block';
                    results.slice(0, 15).forEach((r, index) => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.style.animationDelay = `${index * 0.05}s`; // Stagger dropdown items
                        div.innerHTML = `
                            <div style="display: flex; flex-direction: column;">
                                <span style="font-weight: 700;">${r.item.Name}</span>
                                <small style="color: #888; font-size: 0.75rem;">${r.item.Series}</small>
                            </div>
                        `;
                        div.onclick = () => { submitGuess(r.item); dropdown.style.display = 'none'; input.value = ''; };
                        dropdown.appendChild(div);
                    });
                } else dropdown.style.display = 'none';
            });
        }

        async function submitGuess(charObj) {
            if (gameOver) return;
            guesses.push(charObj);
            document.getElementById('guess-counter').innerText = `Guess ${guesses.length} of 10`;

            if (guesses.length >= 3 && hintsGiven < 3) document.getElementById('hint-btn').style.display = 'block';

            let img = 'https://via.placeholder.com/50/222/fff?text=?';
            try {
                if (charObj.ID) {
                    const resp = await fetch(`https://api.jikan.moe/v4/characters/${charObj.ID}`);
                    const data = await resp.json();
                    img = data.data?.images?.jpg?.image_url || img;
                }
            } catch (e) { }

            renderCard(charObj, img);
            if (charObj.Name.toLowerCase() === secretChar.Name.toLowerCase()) {
                setTimeout(() => endGame(true), 1500);
            } else if (guesses.length >= 10) {
                setTimeout(() => endGame(false), 1500);
            }
        }

        function renderCard(guess, img) {
            const grid = document.getElementById('gameGrid');
            const card = document.createElement('div');
            card.className = 'char-card';

            const cols = ["Series", "Genre", "Year", "Age", "Height", "Sex", "Hair", "Eyes"];
            let attrHtml = cols.map((key, index) => {
                let status = '', val = guess[key];

                if (val.toLowerCase() === secretChar[key].toLowerCase()) {
                    status = 'green';
                } else if ((key === 'Age' || key === 'Height' || key === 'Year') && Math.abs(parseInt(val) - parseInt(secretChar[key])) <= 10) {
                    status = 'yellow';
                }

                if ((key === 'Age' || key === 'Height' || key === 'Year') && status !== 'green' && !isNaN(parseInt(val))) {
                    val += parseInt(val) < parseInt(secretChar[key]) ? " ↑" : " ↓";
                }

                // Apply staggered flip animation
                return `<div class="attr-box ${status}" style="animation-delay: ${index * 0.15}s">
                            <span class="attr-label">${key}</span>
                            <span class="attr-val">${val}</span>
                        </div>`;
            }).join('');

            card.innerHTML = `
                <div class="char-header">
                    <img src="${img}" class="char-thumb">
                    <div class="char-name">${guess.Name}</div>
                </div>
                <div class="attr-grid">${attrHtml}</div>
            `;
            grid.prepend(card);
        }

        function endGame(won) {
            gameOver = true;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('status-area').style.display = 'block';
            document.getElementById('status-msg').innerText = won ? "VICTORY!" : "DEFEAT";
            document.getElementById('status-msg').style.color = won ? 'var(--green)' : 'var(--red)';
            document.getElementById('stats-msg').innerText = `Target: ${secretChar.Name} (${secretChar.Series})`;
        }

        function share() {
            let text = `Scoutdle ${gameMode.toUpperCase()}\nGuesses: ${guesses.length}/10\nhttps://scoutdle.vercel.app`;
            navigator.clipboard.writeText(text).then(() => alert("Results copied!"));
        }

        window.onload = init;
    </script>
</body>

</html>
