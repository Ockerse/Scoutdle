<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scoutdle - Anime Guessing Game</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <style>
        :root {
            --green: #538d4e; 
            --yellow: #b59f3b;
            --bg: #0b0b0b;
            --dark: #212121;
            --text: #ffffff;
            --glow: rgba(83, 141, 78, 0.6);
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: 0; margin: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            width: 100%; background: #111; border-bottom: 1px solid #333;
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 0; position: sticky; top: 0; z-index: 2000;
        }
        
        .home-link { text-decoration: none; cursor: pointer; }

        .title-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .title-logo { width: 40px; height: 40px; border-radius: 8px; border: 2px solid var(--green); object-fit: cover; }
        .header-main { font-size: 1.8rem; font-weight: 900; color: var(--green); text-shadow: 0 0 10px var(--glow); letter-spacing: 2px; margin: 0; }
        
        .nav-buttons { display: flex; justify-content: center; align-items: center; gap: 5px; width: 100%; padding: 0 5px; box-sizing: border-box; }
        .nav-btn { background: none; border: none; color: #888; font-weight: bold; cursor: pointer; padding: 10px 12px; transition: 0.3s; font-size: 0.8rem; text-transform: uppercase; }
        .nav-btn.active { color: var(--green); border-bottom: 2px solid var(--green); }
        
        .kofi-btn { 
            background: var(--green); color: white; border-radius: 20px; 
            padding: 8px 12px; text-decoration: none; font-size: 0.75rem; 
            font-weight: 800; display: flex; align-items: center; gap: 4px;
        }

        /* --- LAYOUT --- */
        .view-section { display: none; width: 92%; max-width: 600px; padding: 15px 0; }
        .view-section.active { display: flex; flex-direction: column; align-items: center; }

        .search-box { width: 100%; position: relative; margin-bottom: 15px; }
        input { 
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #333; 
            background: #111; color: white; box-sizing: border-box; font-size: 1rem; 
            text-align: center; outline: none; appearance: none; /* Fix for iOS */
        }

        /* --- GAME CARDS --- */
        .char-card { background: var(--card-bg); border-radius: 15px; padding: 12px; border: 1px solid #333; margin-bottom: 12px; width: 100%; box-sizing: border-box; animation: slideDown 0.4s ease-out; }
        .char-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .char-image { width: 50px; height: 70px; border-radius: 6px; object-fit: cover; background: #222; border: 1px solid #444; }
        
        /* Grid adjusts for Mobile */
        .attr-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; perspective: 1000px; }
        
        .attr-box { 
            background: #262626; padding: 6px 2px; border-radius: 6px; 
            text-align: center; font-size: 0.65rem; min-height: 45px; 
            display: flex; flex-direction: column; justify-content: center;
            animation: flipIn 0.6s ease-in-out forwards;
            backface-visibility: hidden;
        }
        
        .attr-label { font-size: 0.5rem; color: #aaa; text-transform: uppercase; margin-bottom: 1px; }
        
        /* MOBILE OVERRIDES */
        @media (max-width: 480px) {
            .header-main { font-size: 1.5rem; }
            .attr-grid { grid-template-columns: repeat(2, 1fr); } /* 2 columns on small phones for readability */
            .nav-btn { padding: 10px 8px; font-size: 0.7rem; }
            .char-card { padding: 10px; }
        }

        /* --- ANIMATIONS --- */
        @keyframes flipIn {
            0% { transform: rotateX(0deg); background: #262626; }
            45% { transform: rotateX(90deg); background: #262626; }
            55% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }

        @keyframes flipInGreen {
            0% { transform: rotateX(0deg); background: #262626; }
            45% { transform: rotateX(90deg); background: #262626; }
            55% { transform: rotateX(90deg); background: var(--green); }
            100% { transform: rotateX(0deg); background: var(--green); color: white; }
        }

        .attr-box.green { animation-name: flipInGreen; }

        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .archive-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .archive-table th { background: #222; color: var(--green); padding: 10px; text-align: left; font-size: 0.75rem; }
        .archive-table td { padding: 10px; border-bottom: 1px solid #333; font-size: 0.85rem; }
        .archive-table tr.hidden { display: none; }

        .menu-btn { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1rem; }

        #dropdown { position: absolute; width: 100%; background: #1a1a1a; z-index: 3000; border-radius: 10px; max-height: 250px; overflow-y: auto; display: none; border: 1px solid #444; margin-top: 5px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .item { padding: 12px; cursor: pointer; border-bottom: 1px solid #222; text-align: left; }
    </style>
</head>
<body>

    <nav>
        <a onclick="resetToHome()" class="home-link">
            <div class="title-container">
                <img src="Scoutdle.jpeg" class="title-logo" alt="Logo">
                <h1 class="header-main">SCOUTDLE</h1>
            </div>
        </a>
        
        <div class="nav-buttons">
            <button class="nav-btn active" id="play-nav" onclick="showSection('game-view', this)">Play</button>
            <button class="nav-btn" onclick="showSection('archive-view', this)">Archive</button>
            <button class="nav-btn" onclick="showSection('stats-view', this)">Stats</button>
            <a href="https://ko-fi.com/A4853SSA" target="_blank" class="kofi-btn">☕ Support</a>
        </div>
    </nav>

    <div id="game-view" class="view-section active">
        <div id="start-screen" style="text-align:center; background: var(--card-bg); padding: 30px 15px; border-radius: 20px; border:1px solid #333; width: 100%; box-sizing: border-box;">
            <h2 id="loading-msg" style="color: var(--green);">Accessing Data...</h2>
            <div id="menu-options" style="display:none;">
                <button class="menu-btn" style="background: var(--green); color: #000;" onclick="startGame('daily')">Daily Challenge</button>
                <button class="menu-btn" style="background:#333; color:white;" onclick="startGame('unlimited')">Unlimited Mode</button>
            </div>
        </div>

        <div id="game-content" style="display:none; width:100%;">
            <div id="guess-counter" style="text-align:center; margin-bottom:12px; font-weight: bold; color: var(--green); font-size: 0.9rem;">Guesses: 0 / 10</div>
            <div class="search-box">
                <input type="text" id="guessInput" placeholder="Character Name..." autocomplete="off">
                <div id="dropdown"></div>
            </div>
            <div id="gameGrid"></div>
        </div>
    </div>

    <div id="archive-view" class="view-section">
        <h2 style="color: var(--green); margin-bottom: 15px; font-size: 1.4rem;">Character Archive</h2>
        <input type="text" id="archiveSearch" placeholder="Search series or name..." onkeyup="filterArchive()">
        <table class="archive-table" id="archiveTable">
            <thead><tr><th>Series</th><th>Character</th></tr></thead>
            <tbody id="archiveBody"></tbody>
        </table>
    </div>

    <div id="stats-view" class="view-section">
        <h2 style="color: var(--green); font-size: 1.4rem;">Stats</h2>
        <div style="text-align:center; background: var(--card-bg); padding: 20px; border-radius: 15px; width: 100%; box-sizing: border-box;">
            <p style="color: #888;">Tracking enabled soon!</p>
        </div>
    </div>

    <script>
        let characters = [], secretChar = null, fuse = null, guesses = [], gameOver = false;

        async function fetchImage(id, retries = 2) {
            if (!id || isNaN(id)) return "Scoutdle.jpeg";
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(`https://api.jikan.moe/v4/characters/${id}`);
                    if (res.ok) {
                        const data = await res.json();
                        return data.data?.images?.jpg?.image_url || "Scoutdle.jpeg";
                    }
                    if (res.status === 429) await new Promise(r => setTimeout(r, 1000));
                } catch (e) {}
            }
            return "Scoutdle.jpeg";
        }

        function resetToHome() {
            gameOver = false; guesses = [];
            document.getElementById('game-content').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
            document.getElementById('gameGrid').innerHTML = '';
            document.getElementById('guessInput').value = '';
            showSection('game-view', document.getElementById('play-nav'));
        }

        async function init() {
            Papa.parse("anime.csv", {
                download: true, header: false, skipEmptyLines: true,
                complete: function (results) {
                    characters = results.data.map(r => ({
                        "Name": r[0]?.trim(), "Series": r[1]?.trim(), "Age": r[2]?.trim(),
                        "Height": r[3]?.trim(), "Sex": r[4]?.trim(), "Hair": r[5]?.trim(),
                        "Eyes": r[6]?.trim(), "ID": r[7]?.trim(), "Genre": r[8]?.trim() || "???",
                        "Year": r[9]?.trim() || "????"
                    })).filter(c => c.Name && c.Name.toLowerCase() !== "name");
                    fuse = new Fuse(characters, { keys: ['Name'], threshold: 0.35 });
                    populateArchive();
                    document.getElementById('loading-msg').style.display = "none";
                    document.getElementById('menu-options').style.display = 'block';
                }
            });
        }

        function populateArchive() {
            const archiveBody = document.getElementById('archiveBody');
            const sortedChars = [...characters].sort((a, b) => a.Series.localeCompare(b.Series));
            archiveBody.innerHTML = sortedChars.map(c => `<tr><td style="color:#888;">${c.Series}</td><td><strong>${c.Name}</strong></td></tr>`).join('');
        }

        function filterArchive() {
            const filter = document.getElementById("archiveSearch").value.toLowerCase();
            const rows = document.getElementById("archiveTable").getElementsByTagName("tr");
            for (let i = 1; i < rows.length; i++) {
                rows[i].classList.toggle("hidden", !rows[i].textContent.toLowerCase().includes(filter));
            }
        }

        function startGame(mode) {
            gameOver = false; guesses = [];
            document.getElementById('gameGrid').innerHTML = '';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'block';
            document.getElementById('guess-counter').innerText = `Guesses: 0 / 10`;
            secretChar = characters[Math.floor(Math.random() * characters.length)];
            setupSearch();
        }

        function setupSearch() {
            const input = document.getElementById('guessInput');
            const dropdown = document.getElementById('dropdown');
            input.oninput = () => {
                const results = fuse.search(input.value).slice(0, 5);
                dropdown.innerHTML = results.map(r => `
                    <div class="item" onclick="selectGuess('${r.item.Name}')">
                        <strong style="color:var(--green);">${r.item.Name}</strong><br>
                        <small style="color:#888;">${r.item.Series}</small>
                    </div>`).join('');
                dropdown.style.display = results.length > 0 ? 'block' : 'none';
            };
        }

        async function selectGuess(name) {
            const char = characters.find(c => c.Name === name);
            if (!char || gameOver) return;
            document.getElementById('guessInput').value = '';
            document.getElementById('dropdown').style.display = 'none';
            guesses.push(char);
            document.getElementById('guess-counter').innerText = `Guesses: ${guesses.length} / 10`;
            await renderGuessCard(char);
            if (char.Name === secretChar.Name) {
                gameOver = true;
                setTimeout(() => alert("✨ Victory! It was " + secretChar.Name), 1200);
            } else if (guesses.length >= 10) {
                gameOver = true;
                setTimeout(() => alert("💀 Game Over! It was " + secretChar.Name), 1200);
            }
        }

        async function renderGuessCard(guess) {
            const grid = document.getElementById('gameGrid');
            const card = document.createElement('div');
            card.className = 'char-card';
            const imgUrl = await fetchImage(guess.ID);
            const attrs = ["Series", "Genre", "Year", "Sex", "Age", "Height", "Hair", "Eyes"];
            
            const attrHtml = attrs.map((k, index) => {
                const match = guess[k]?.toLowerCase() === secretChar[k]?.toLowerCase();
                const delay = index * 0.1;
                return `<div class="attr-box ${match ? 'green' : ''}" style="animation-delay: ${delay}s">
                            <span class="attr-label">${k}</span>
                            <span><b>${guess[k]}</b></span>
                        </div>`;
            }).join('');

            card.innerHTML = `<div class="char-header">
                <img src="${imgUrl}" class="char-image" onerror="this.src='Scoutdle.jpeg'">
                <div><strong style="color:var(--green); font-size:1rem;">${guess.Name}</strong><br>
                <small style="color:#888; font-size:0.8rem;">${guess.Series}</small></div>
            </div>
            <div class="attr-grid">${attrHtml}</div>`;
            
            grid.prepend(card);
        }

        function showSection(id, btn) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
