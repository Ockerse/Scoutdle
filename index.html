<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoutdle - Anime Guessing Game</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <style>
        :root {
            --green: #538d4e; 
            --yellow: #b59f3b;
            --bg: #0b0b0b;
            --dark: #212121;
            --text: #ffffff;
            --glow: rgba(83, 141, 78, 0.6);
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }

        /* --- CENTERED NAVIGATION --- */
        nav {
            width: 100%;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column; 
            align-items: center;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .title-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--green);
        }

        .header-main {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--green);
            text-shadow: 0 0 10px var(--glow);
            letter-spacing: 3px;
            margin: 0;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #888;
            font-weight: bold;
            cursor: pointer;
            padding: 8px 15px;
            transition: 0.3s;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .nav-btn.active { color: var(--green); border-bottom: 2px solid var(--green); }
        
        .kofi-btn {
            background: var(--green); 
            color: #000 !important;
            border-radius: 20px;
            padding: 6px 15px !important;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            margin-left: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .kofi-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--glow); }

        /* --- LAYOUT --- */
        .view-section { display: none; width: 95%; max-width: 650px; padding: 20px 0; }
        .view-section.active { display: flex; flex-direction: column; align-items: center; }

        /* --- STATS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; margin: 20px 0; }
        .stat-card { background: var(--card-bg); padding: 15px 5px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: 900; display: block; color: var(--green); }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }

        /* --- ARCHIVE --- */
        .archive-container { width: 100%; background: var(--card-bg); border-radius: 15px; overflow-x: auto; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 450px; }
        th { background: #222; padding: 12px; text-align: left; color: var(--green); position: sticky; top: 0; }
        td { padding: 10px 12px; border-bottom: 1px solid #333; }

        /* --- GAMEPLAY & ANIMATIONS --- */
        .search-box { width: 100%; position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #333; background: #111; color: white; box-sizing: border-box; font-size: 1rem; text-align: center; }
        input:focus { outline: none; border-color: var(--green); }
        
        #dropdown { position: absolute; width: 100%; background: #1a1a1a; z-index: 3000; border-radius: 10px; max-height: 250px; overflow-y: auto; display: none; border: 1px solid #444; margin-top: 5px; }
        .item { padding: 12px; cursor: pointer; border-bottom: 1px solid #222; text-align: center; }

        .guess-container { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        
        /* The Card Container */
        .char-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid #333;
            animation: slideDown 0.4s ease-out;
        }

        .attr-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }

        /* The Flipping Attribute Box */
        .attr-box { 
            background: #262626; 
            padding: 8px 4px; 
            border-radius: 8px; 
            text-align: center; 
            font-size: 0.7rem; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            min-height: 50px; 
            word-break: break-word;
            
            /* Flip Animation Defaults */
            opacity: 0;
            transform: rotateX(-90deg);
            animation: flipIn 0.5s forwards;
        }

        .attr-label { font-size: 0.55rem; color: #aaa; text-transform: uppercase; margin-bottom: 2px; }
        
        .green { 
            background: var(--green) !important; 
            color: white; 
            box-shadow: 0 0 10px var(--glow);
        }
        .yellow { background: var(--yellow) !important; color: #000; }

        /* Keyframes */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes flipIn {
            to { opacity: 1; transform: rotateX(0deg); }
        }

        .menu-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .daily-btn { background: var(--green); color: #000; }
    </style>
</head>
<body>

    <nav>
        <div class="title-container">
            <img src="Scoutdle.jpeg" alt="" class="title-logo" onerror="this.style.display='none'">
            <h1 class="header-main">SCOUTDLE</h1>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showSection('game-view', this)">Play</button>
            <button class="nav-btn" onclick="showSection('archive-view', this)">Archive</button>
            <button class="nav-btn" onclick="showSection('stats-view', this)">Stats</button>
            <a href="https://ko-fi.com/YOUR_LINK" target="_blank" class="kofi-btn">☕ Donate</a>
        </div>
    </nav>

    <div id="game-view" class="view-section active">
        <div id="start-screen" style="text-align:center; background: var(--card-bg); padding: 40px 20px; border-radius: 20px; border:1px solid #333; width: 100%; box-sizing: border-box;">
            <h2 id="loading-msg" style="color: var(--green);">Accessing Data...</h2>
            <div id="menu-options" style="display:none;">
                <button class="menu-btn daily-btn" onclick="startGame('daily')">Daily Challenge</button>
                <button class="menu-btn" style="background:#333; color:white;" onclick="startGame('unlimited')">Unlimited Mode</button>
            </div>
        </div>

        <div id="game-content" style="display:none; width:100%;">
            <div id="guess-counter" style="text-align:center; margin-bottom:15px; font-weight: bold; color: var(--green);">Guesses: 0 / 10</div>
            <div class="search-box">
                <input type="text" id="guessInput" placeholder="Who is the character?" autocomplete="off">
                <div id="dropdown"></div>
            </div>
            <div id="gameGrid" class="guess-container"></div>
        </div>
    </div>

    <div id="archive-view" class="view-section">
        <h2 style="color:var(--green); text-shadow: 0 0 10px var(--glow);">Character Archive</h2>
        <input type="text" id="archiveSearch" placeholder="Filter..." oninput="filterArchive()" style="margin-bottom:20px;">
        <div class="archive-container"><table id="archiveTable"><thead><tr><th>Series</th><th>Name</th><th>Genre</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="stats-view" class="view-section">
        <h2 style="color:var(--green); text-shadow: 0 0 10px var(--glow);">Your Stats</h2>
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-val" id="stat-played">0</span><span class="stat-label">Played</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-winpct">0%</span><span class="stat-label">Win %</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-curstreak">0</span><span class="stat-label">Streak</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-maxstreak">0</span><span class="stat-label">Best</span></div>
        </div>
    </div>

    <script>
        let characters = [], secretChar = null, fuse = null, guesses = [], gameOver = false;

        function showSection(sectionId, btn) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            btn.classList.add('active');
            if(sectionId === 'stats-view') updateStatsDisplay();
        }

        async function init() {
            Papa.parse("anime.csv", {
                download: true, header: false, skipEmptyLines: true,
                complete: function (results) {
                    characters = results.data.map(r => ({
                        "Name": r[0]?.trim(), "Series": r[1]?.trim(), "Age": r[2]?.trim(),
                        "Height": r[3]?.trim(), "Sex": r[4]?.trim(), "Hair": r[5]?.trim(),
                        "Eyes": r[6]?.trim(), "ID": r[7]?.trim(), "Genre": r[8]?.trim() || "???",
                        "Year": r[9]?.trim() || "????"
                    })).filter(c => c.Name && c.Name.toLowerCase() !== "name");
                    fuse = new Fuse(characters, { keys: ['Name', 'Series'], threshold: 0.35 });
                    populateArchive();
                    document.getElementById('loading-msg').style.display = "none";
                    document.getElementById('menu-options').style.display = 'block';
                }
            });
        }

        function populateArchive() {
            const tbody = document.querySelector('#archiveTable tbody');
            const sorted = [...characters].sort((a, b) => {
                const sComp = a.Series.localeCompare(b.Series);
                return sComp !== 0 ? sComp : a.Name.localeCompare(b.Name);
            });
            tbody.innerHTML = sorted.map(c => `<tr><td style="color:var(--green); font-weight:bold;">${c.Series}</td><td>${c.Name}</td><td><small>${c.Genre}</small></td></tr>`).join('');
        }

        function filterArchive() {
            const q = document.getElementById('archiveSearch').value.toLowerCase();
            document.querySelectorAll('#archiveTable tbody tr').forEach(row => row.style.display = row.innerText.toLowerCase().includes(q) ? '' : 'none');
        }

        async function startGame(mode) {
            gameOver = false; guesses = [];
            document.getElementById('gameGrid').innerHTML = '';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'block';
            secretChar = characters[Math.floor(Math.random() * characters.length)];
            setupSearch();
        }

        function setupSearch() {
            const input = document.getElementById('guessInput');
            const dropdown = document.getElementById('dropdown');
            input.oninput = () => {
                const results = fuse.search(input.value).slice(0, 5);
                dropdown.innerHTML = '';
                if (results.length > 0 && input.value.length > 0) {
                    dropdown.style.display = 'block';
                    results.forEach(r => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `<strong style="color: var(--green);">${r.item.Name}</strong> <br><small style="color:#888;">${r.item.Series}</small>`;
                        div.onclick = () => { submitGuess(r.item); input.value = ''; dropdown.style.display = 'none'; };
                        dropdown.appendChild(div);
                    });
                } else dropdown.style.display = 'none';
            };
        }

        function submitGuess(guess) {
            if (gameOver) return;
            guesses.push(guess);
            document.getElementById('guess-counter').innerText = `Guesses: ${guesses.length} / 10`;
            renderGuessCard(guess);
            if (guess.Name.toLowerCase() === secretChar.Name.toLowerCase()) {
                gameOver = true; saveStats(true);
                setTimeout(() => alert("✨ VICTORY! Character was " + secretChar.Name), 1200);
            } else if (guesses.length >= 10) {
                gameOver = true; saveStats(false);
                setTimeout(() => alert("💀 GAME OVER! It was " + secretChar.Name), 1200);
            }
        }

        function renderGuessCard(guess) {
            const grid = document.getElementById('gameGrid');
            const card = document.createElement('div');
            card.className = 'char-card';
            
            const attrs = [
                { label: "Series", val: guess.Series, match: guess.Series === secretChar.Series },
                { label: "Genre", val: guess.Genre, match: guess.Genre === secretChar.Genre },
                { label: "Year", val: guess.Year, match: guess.Year === secretChar.Year },
                { label: "Sex", val: guess.Sex, match: guess.Sex === secretChar.Sex },
                { label: "Age", val: guess.Age, match: guess.Age === secretChar.Age },
                { label: "Height", val: guess.Height, match: guess.Height === secretChar.Height },
                { label: "Hair", val: guess.Hair, match: guess.Hair === secretChar.Hair },
                { label: "Eyes", val: guess.Eyes, match: guess.Eyes === secretChar.Eyes }
            ];

            // Use staggering delay for flip animation
            const attrHtml = attrs.map((a, i) => `
                <div class="attr-box ${a.match ? 'green' : ''}" style="animation-delay: ${i * 0.1}s">
                    <span class="attr-label">${a.label}</span>
                    <span class="attr-val"><b>${a.val}</b></span>
                </div>
            `).join('');

            card.innerHTML = `<strong style="color:var(--green); font-size: 1.1rem; margin-bottom: 10px; display: block;">${guess.Name}</strong><div class="attr-grid">${attrHtml}</div>`;
            grid.prepend(card);
        }

        function saveStats(won) {
            let stats = JSON.parse(localStorage.getItem('scoutdle_stats')) || { played: 0, wins: 0, curStreak: 0, maxStreak: 0 };
            stats.played++;
            if (won) { stats.wins++; stats.curStreak++; if (stats.curStreak > stats.maxStreak) stats.maxStreak = stats.curStreak; }
            else { stats.curStreak = 0; }
            localStorage.setItem('scoutdle_stats', JSON.stringify(stats));
        }

        function updateStatsDisplay() {
            const stats = JSON.parse(localStorage.getItem('scoutdle_stats')) || { played: 0, wins: 0, curStreak: 0, maxStreak: 0 };
            document.getElementById('stat-played').innerText = stats.played;
            document.getElementById('stat-winpct').innerText = stats.played ? Math.round((stats.wins / stats.played) * 100) + "%" : "0%";
            document.getElementById('stat-curstreak').innerText = stats.curStreak;
            document.getElementById('stat-maxstreak').innerText = stats.maxStreak;
        }

        window.onload = init;
    </script>
</body>
</html>
