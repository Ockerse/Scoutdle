<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoutdle - Anime Guessing Game</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <style>
        :root {
            --green: #538d4e;
            --yellow: #b59f3b;
            --bg: #000000;
            --dark: #212121;
            --text: #ffffff;
            --blue: #00ccff;
            --red: #ff4d4d;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            min-height: 100vh;
        }

        /* --- ANIMATIONS --- */
        @keyframes popIn {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes flip {
            0% { transform: rotateX(0); }
            45% { transform: rotateX(90deg); opacity: 0.5; }
            55% { transform: rotateX(90deg); opacity: 0.5; }
            100% { transform: rotateX(0); opacity: 1; }
        }

        /* --- HEADER --- */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 5px 0;
        }

        .header-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }

        .header {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin: 0;
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .menu-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid #333;
            max-width: 350px;
            width: 85%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .menu-btn {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .daily-btn { background: var(--blue); color: #000; }
        .unlimited-btn { background: #333; color: #fff; border: 1px solid #444; }

        /* --- SEARCH DROPDOWN --- */
        #dropdown {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-radius: 15px;
            z-index: 1000;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #333;
        }

        .item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item:hover { background: #222; }

        /* --- GAME CARDS --- */
        .guess-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            padding-bottom: 80px;
        }

        .char-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #222;
            animation: popIn 0.4s ease-out;
        }

        .char-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .char-thumb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            background: #333;
        }

        .char-name { font-size: 1.1rem; font-weight: 700; }

        .attr-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .attr-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            background: #262626;
            text-align: center;
            animation: flip 0.6s ease-in-out forwards;
        }

        .attr-label {
            font-size: 0.6rem;
            color: #ffffff !important;
            text-transform: uppercase;
            margin-bottom: 2px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        .attr-val { 
            font-weight: 700; 
            line-height: 1.1; 
            color: #ffffff !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        .green { background-color: var(--green) !important; }
        .yellow { background-color: var(--yellow) !important; }

        /* --- UI ELEMENTS --- */
        .search-box {
            position: sticky;
            top: 10px;
            z-index: 1000;
            width: 100%;
            max-width: 480px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px 24px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #111;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        #guess-counter {
            color: #888;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        #hint-box {
            width: 100%;
            max-width: 480px;
            text-align: center;
            margin-bottom: 15px;
            min-height: 50px;
        }

        #hint-btn {
            background: var(--yellow);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            display: none;
            margin: 0 auto;
        }

        #hint-text {
            color: var(--yellow);
            font-weight: bold;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        #status-area {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 25px;
            z-index: 4000;
            text-align: center;
            width: 85%;
            max-width: 380px;
            display: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3500;
            display: none;
        }

        .share-btn {
            background: var(--green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }

        #view-board-float {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2500;
            display: none;
        }

        .float-btn {
            background: var(--blue);
            color: #000;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div id="start-screen">
        <div class="menu-card">
            <h1>SCOUTDLE</h1>
            <p id="loading-msg">Loading Anime Data...</p>
            <div id="menu-options" style="display:none;">
                <button class="menu-btn daily-btn" id="daily-btn-text" onclick="startGame('daily')">Daily Challenge</button>
                <button class="menu-btn unlimited-btn" onclick="startGame('unlimited')">Unlimited Mode</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    
    <div id="status-area">
        <h2 id="status-msg"></h2>
        <p id="stats-msg"></p>
        <button class="share-btn" onclick="share()">SHARE RESULTS</button>
        <button class="menu-btn" style="background: #333; color: white;" onclick="toggleResults(false)">VIEW BOARD</button>
        <button class="menu-btn unlimited-btn" onclick="location.reload()">MAIN MENU</button>
    </div>

    <div id="view-board-float">
        <button class="float-btn" onclick="toggleResults(true)">Back to Stats</button>
    </div>

    <div class="header-container">
        <img src="Scoutdle.jpeg" class="header-logo" alt="" onerror="this.style.display='none'">
        <div class="header">SCOUTDLE</div>
    </div>

    <div id="guess-counter">Guess 0 of 10</div>

    <div id="hint-box">
        <button id="hint-btn" onclick="revealHint()">GET A HINT</button>
        <div id="hint-text"></div>
    </div>

    <div class="search-box">
        <input type="text" id="guessInput" placeholder="Search character..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div id="dropdown"></div>
    </div>

    <div id="gameGrid" class="guess-container"></div>

    <script>
        let characters = [], secretChar = null, fuse = null, guesses = [], gameOver = false;
        let gameMode = 'daily', hintsGiven = 0;

        async function init() {
            Papa.parse("anime.csv", {
                download: true, header: false, skipEmptyLines: true,
                complete: function (results) {
                    characters = results.data.map(r => ({
                        "Name": r[0]?.trim(), "Series": r[1]?.trim(), "Age": r[2]?.trim(),
                        "Height": r[3]?.trim(), "Sex": r[4]?.trim(), "Hair": r[5]?.trim(),
                        "Eyes": r[6]?.trim(), "ID": r[7]?.trim(), "Genre": r[8]?.trim() || "Unknown",
                        "Year": r[9]?.trim() || "????"
                    })).filter(c => c.Name && c.Name.toLowerCase() !== "name");

                    // 1. IMPROVED ENGINE: High weighting on Name + Low Threshold
                    fuse = new Fuse(characters, { 
                        keys: [
                            { name: 'Name', weight: 2 }, 
                            { name: 'Series', weight: 0.3 }
                        ], 
                        threshold: 0.3,       // Strict threshold to avoid irrelevant fuzzy results
                        location: 0,          // Start searching from the beginning
                        distance: 100,        // How far from start to look
                        minMatchCharLength: 1,
                        includeScore: true,   // Needed for our custom sorting
                        shouldSort: true
                    });

                    checkDailyStatus();
                    document.getElementById('loading-msg').innerText = "Data Synced.";
                    document.getElementById('menu-options').style.display = 'block';
                }
            });
        }

        function getDailyKey() {
            const now = new Date();
            return `scoutdle_daily_${now.getUTCFullYear()}_${now.getUTCMonth() + 1}_${now.getUTCDate()}`;
        }

        function checkDailyStatus() {
            const key = getDailyKey();
            const saved = localStorage.getItem(key);
            if (saved) {
                const data = JSON.parse(saved);
                const btn = document.getElementById('daily-btn-text');
                if (data.finished) {
                    btn.innerText = "Daily Completed ✓";
                    btn.style.opacity = "0.6";
                } else {
                    btn.innerText = "Continue Daily Challenge";
                }
            }
        }

        async function startGame(mode) {
            gameMode = mode;
            const dailyKey = getDailyKey();
            const now = new Date();
            const seed = parseInt(now.getUTCFullYear().toString() + (now.getUTCMonth() + 1) + now.getUTCDate());
            
            if (mode === 'daily') {
                secretChar = characters[seed % characters.length];
                const saved = localStorage.getItem(dailyKey);
                if (saved) {
                    const data = JSON.parse(saved);
                    document.getElementById('start-screen').style.display = 'none';
                    setupSearch();
                    
                    hintsGiven = data.hintsGiven || 0;
                    if (hintsGiven > 0) {
                        const hDisplay = document.getElementById('hint-text');
                        if (hintsGiven >= 1) hDisplay.innerHTML = `HINT 1: Released in ${secretChar.Year}`;
                        if (hintsGiven >= 2) hDisplay.innerHTML += `<br>HINT 2: Genre is ${secretChar.Genre}`;
                        if (hintsGiven >= 3) {
                            hDisplay.innerHTML += `<br>HINT 3: From the series "${secretChar.Series}"`;
                            document.getElementById('hint-btn').style.display = 'none';
                        }
                    }

                    for (let i = 0; i < data.guesses.length; i++) {
                        const isLast = (i === data.guesses.length - 1);
                        await submitGuess(data.guesses[i], true, isLast && data.finished);
                    }
                    return;
                }
            } else {
                secretChar = characters[Math.floor(Math.random() * characters.length)];
            }
            
            document.getElementById('start-screen').style.display = 'none';
            setupSearch();
        }

        function saveProgress(finished = false) {
            if (gameMode !== 'daily') return;
            const data = {
                guesses: guesses,
                finished: finished,
                hintsGiven: hintsGiven
            };
            localStorage.setItem(getDailyKey(), JSON.stringify(data));
        }

        function revealHint() {
            hintsGiven++;
            const hDisplay = document.getElementById('hint-text');
            if (hintsGiven === 1) hDisplay.innerText = `HINT 1: Released in ${secretChar.Year}`;
            else if (hintsGiven === 2) hDisplay.innerHTML = `HINT 1: Released in ${secretChar.Year}<br>HINT 2: Genre is ${secretChar.Genre}`;
            else if (hintsGiven === 3) {
                hDisplay.innerHTML = `HINT 1: Released in ${secretChar.Year}<br>HINT 2: Genre is ${secretChar.Genre}<br>HINT 3: From the series "${secretChar.Series}"`;
                document.getElementById('hint-btn').style.display = 'none';
            }
            saveProgress(gameOver);
        }

        function setupSearch() {
            const input = document.getElementById('guessInput');
            const dropdown = document.getElementById('dropdown');
            
            input.addEventListener('input', (e) => {
                if (gameOver) return;
                if (e.isComposing) return;

                const val = input.value.trim().toLowerCase();
                let results = fuse.search(val);
                
                dropdown.innerHTML = '';
                
                if (val.length > 0 && results.length > 0) {
                    dropdown.style.display = 'block';

                    // 2. CUSTOM SORT: Prioritize matches where the Name starts with input
                    results.sort((a, b) => {
                        const aName = a.item.Name.toLowerCase();
                        const bName = b.item.Name.toLowerCase();
                        const aStarts = aName.startsWith(val);
                        const bStarts = bName.startsWith(val);

                        if (aStarts && !bStarts) return -1;
                        if (!aStarts && bStarts) return 1;
                        return a.score - b.score;
                    });

                    results.slice(0, 15).forEach((r) => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `<div><span style="font-weight:700;">${r.item.Name}</span><br><small style="color:#888;">${r.item.Series}</small></div>`;
                        div.onclick = () => { 
                            submitGuess(r.item); 
                            dropdown.style.display = 'none'; 
                            input.value = ''; 
                        };
                        dropdown.appendChild(div);
                    });
                } else dropdown.style.display = 'none';
            });

            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const firstResult = dropdown.querySelector('.item');
                    if (firstResult) firstResult.click();
                }
            });
        }

        async function submitGuess(charObj, isRestoring = false, showEnd = false) {
            if (gameOver && !isRestoring) return;
            if (!isRestoring) guesses.push(charObj);
            
            document.getElementById('guess-counter').innerText = `Guess ${guesses.length} of 10`;
            if (guesses.length >= 3 && hintsGiven < 3) document.getElementById('hint-btn').style.display = 'block';

            let img = 'https://via.placeholder.com/50/222/fff?text=?';
            try {
                if (charObj.ID) {
                    const resp = await fetch(`https://api.jikan.moe/v4/characters/${charObj.ID}`);
                    const data = await resp.json();
                    img = data.data?.images?.jpg?.image_url || img;
                }
            } catch (e) { }

            renderCard(charObj, img);

            const isCorrect = charObj.Name.toLowerCase() === secretChar.Name.toLowerCase();
            const outOfGuesses = guesses.length >= 10;

            if (isCorrect || outOfGuesses) {
                gameOver = true;
                if (!isRestoring) {
                    saveProgress(true);
                    setTimeout(() => endGame(isCorrect), 1200);
                } else if (showEnd) {
                    endGame(isCorrect);
                }
            } else {
                if (!isRestoring) saveProgress(false);
            }
        }

        function renderCard(guess, img) {
            const grid = document.getElementById('gameGrid');
            const card = document.createElement('div');
            card.className = 'char-card';
            const cols = ["Series", "Genre", "Year", "Age", "Height", "Sex", "Hair", "Eyes"];
            let attrHtml = cols.map((key, index) => {
                let status = '', val = guess[key];
                const sVal = secretChar[key];
                if (val.toLowerCase() === sVal.toLowerCase()) status = 'green';
                else if (['Age', 'Height', 'Year'].includes(key)) {
                    const gN = parseInt(val), tN = parseInt(sVal);
                    if (!isNaN(gN) && !isNaN(tN)) {
                        let r = (key === 'Height') ? 10 : 5;
                        if (Math.abs(gN - tN) <= r) status = 'yellow';
                        val += gN < tN ? " ↑" : " ↓";
                    }
                }
                return `<div class="attr-box ${status}" style="animation-delay: ${index * 0.1}s"><span class="attr-label">${key}</span><span class="attr-val">${val}</span></div>`;
            }).join('');
            card.innerHTML = `<div class="char-header"><img src="${img}" class="char-thumb"><div class="char-name">${guess.Name}</div></div><div class="attr-grid">${attrHtml}</div>`;
            grid.prepend(card);
        }

        function getEmojiGrid() {
            return guesses.map(guess => {
                const cols = ["Series", "Genre", "Year", "Age", "Height", "Sex", "Hair", "Eyes"];
                return cols.map(key => {
                    const v = guess[key], sV = secretChar[key];
                    if (v.toLowerCase() === sV.toLowerCase()) return '🟩';
                    if (['Age', 'Height', 'Year'].includes(key)) {
                        const gN = parseInt(v), tN = parseInt(sV);
                        let r = (key === 'Height') ? 10 : 5;
                        if (Math.abs(gN - tN) <= r) return '🟨';
                    }
                    return '⬛';
                }).join('');
            }).join('\n');
        }

        function share() {
            const won = guesses[guesses.length - 1].Name.toLowerCase() === secretChar.Name.toLowerCase();
            const score = won ? guesses.length : 'X';
            const text = `Scoutdle ${gameMode.toUpperCase()} ${score}/10\n\n${getEmojiGrid()}\n\nhttps://scoutdle.vercel.app`;
            if (navigator.share && /Android|iPhone|iPad/i.test(navigator.userAgent)) {
                navigator.share({ title: 'Scoutdle Results', text: text }).catch(() => copyToClipboard(text));
            } else copyToClipboard(text);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.share-btn');
                const old = btn.innerText;
                btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = old, 2000);
            });
        }

        function endGame(won) {
            gameOver = true;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('status-area').style.display = 'block';
            document.getElementById('status-msg').innerText = won ? "VICTORY!" : "DEFEAT";
            document.getElementById('status-msg').style.color = won ? 'var(--green)' : 'var(--red)';
            document.getElementById('stats-msg').innerText = `Target: ${secretChar.Name} (${secretChar.Series})`;
        }

        function toggleResults(show) {
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
            document.getElementById('status-area').style.display = show ? 'block' : 'none';
            document.getElementById('view-board-float').style.display = show ? 'none' : 'block';
        }

        window.onload = init;
    </script>
</body>
</html>
