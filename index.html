<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoutdle - Anime Guessing Game</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    
    <style>
        :root { 
            --green: #538d4e; --yellow: #b59f3b; --bg: #000000; 
            --dark: #212121; --text: #ffffff; --blue: #00ccff; --red: #ff4d4d; 
            --card-bg: #1a1a1a;
        }

        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; margin: 0; min-height: 100vh;
        }

        /* --- START SCREEN OVERLAY --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 3000; text-align: center;
        }

        .menu-card {
            background: var(--card-bg); padding: 40px; border-radius: 25px;
            border: 1px solid #333; max-width: 350px; width: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-btn {
            width: 100%; padding: 18px; margin: 12px 0; border: none;
            border-radius: 12px; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; transition: transform 0.2s, filter 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .daily-btn { background: var(--blue); color: #000; }
        .unlimited-btn { background: #333; color: #fff; border: 1px solid #444; }
        .menu-btn:hover { transform: scale(1.03); filter: brightness(1.1); }

        /* --- SEARCH & UI --- */
        .header { font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; margin: 20px 0 5px 0; }
        #guess-counter { color: #888; margin-bottom: 20px; font-weight: 600; font-size: 0.9rem; }

        .search-box { position: sticky; top: 10px; z-index: 1000; width: 100%; max-width: 480px; margin-bottom: 25px; }
        input { 
            width: 100%; padding: 16px 24px; border-radius: 30px; border: 1px solid #333; 
            background: #111; color: white; font-size: 1rem; outline: none; box-sizing: border-box;
        }

        #dropdown { 
            position: absolute; top: 110%; left: 0; right: 0; 
            background: #1a1a1a; border-radius: 15px; z-index: 1000; display: none; 
            max-height: 280px; overflow-y: auto; border: 1px solid #333;
        }
        
        .item { padding: 14px 20px; cursor: pointer; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .item:hover { background: #222; }

        /* --- CARDS --- */
        .guess-container { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 480px; padding-bottom: 40px; }
        
        .char-card {
            background: var(--card-bg); border-radius: 18px; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            border: 1px solid #222;
        }

        .char-header { display: flex; align-items: center; gap: 12px; }
        .char-thumb { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #333; }
        .char-name { font-size: 1.2rem; font-weight: 700; }

        .attr-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .attr-box {
            display: flex; flex-direction: column; align-items: center; 
            padding: 8px; border-radius: 10px; font-size: 0.8rem; background: #262626;
        }
        .attr-label { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .attr-val { font-weight: 700; }

        .green { background-color: var(--green) !important; }
        .yellow { background-color: var(--yellow) !important; }

        /* --- END GAME POPUP --- */
        #status-area {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; border: 1px solid #333; padding: 30px; border-radius: 25px;
            z-index: 4000; text-align: center; width: 80%; max-width: 350px; display: none;
        }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3500; display:none; }
        
        .share-btn { background: var(--green); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; width: 100%; margin-top: 15px; cursor: pointer;}
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="menu-card">
            <h1 style="letter-spacing: 5px; margin-top: 0;">SCOUTDLE</h1>
            <p id="loading-msg" style="color: #666; margin-bottom: 25px;">Loading Anime Data...</p>
            <div id="menu-options" style="display:none;">
                <button class="menu-btn daily-btn" onclick="startGame('daily')">Daily Challenge</button>
                <button class="menu-btn unlimited-btn" onclick="startGame('unlimited')">Unlimited Mode</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="status-area">
        <div id="char-info"></div>
        <h2 id="status-msg" style="margin: 10px 0;"></h2>
        <p id="stats-msg" style="color: #888;"></p>
        <button class="share-btn" onclick="share()">SHARE RESULTS</button>
        <button class="menu-btn unlimited-btn" onclick="location.reload()" style="padding: 12px; font-size: 0.9rem;">MAIN MENU</button>
    </div>

    <div class="header">SCOUTDLE</div>
    <div id="guess-counter">Guess 0 of 10</div>

    <div class="search-box">
        <input type="text" id="guessInput" placeholder="Search character..." autocomplete="off">
        <div id="dropdown"></div>
    </div>

    <div id="gameGrid" class="guess-container"></div>

    <script>
        let characters = [], secretChar = null, fuse = null, guesses = [], gameOver = false;
        let gameMode = 'daily';

        async function init() {
            Papa.parse("anime.csv", {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    // UPDATED: Now captures r[7] as the MAL_ID
                    characters = results.data.map(r => ({
                        "Name": r[0]?.trim(), 
                        "Series": r[1]?.trim(), 
                        "Age": r[2]?.trim(),
                        "Height": r[3]?.trim(), 
                        "Sex": r[4]?.trim(), 
                        "Hair": r[5]?.trim(), 
                        "Eyes": r[6]?.trim(),
                        "ID": r[7]?.trim() 
                    })).filter(c => c.Name && c.Name.toLowerCase() !== "name");

                    fuse = new Fuse(characters, { keys: ['Name', 'Series'], threshold: 0.3 });
                    document.getElementById('loading-msg').innerText = "Data Synced.";
                    document.getElementById('menu-options').style.display = 'block';
                },
                error: function() {
                    document.getElementById('loading-msg').innerText = "Error: anime.csv not found.";
                }
            });
        }

        function startGame(mode) {
            gameMode = mode;
            document.getElementById('start-screen').style.display = 'none';
            
            if (mode === 'daily') {
                const now = new Date();
                const dateStr = now.getUTCFullYear().toString() + (now.getUTCMonth()+1) + now.getUTCDate();
                const seed = parseInt(dateStr);
                secretChar = characters[seed % characters.length];
            } else {
                secretChar = characters[Math.floor(Math.random() * characters.length)];
            }
            setupSearch();
        }

        function setupSearch() {
            const input = document.getElementById('guessInput'), dropdown = document.getElementById('dropdown');
            input.addEventListener('input', () => {
                if (gameOver) return;
                const results = fuse.search(input.value);
                dropdown.innerHTML = '';
                if (input.value.length > 0 && results.length > 0) {
                    dropdown.style.display = 'block';
                    results.slice(0, 6).forEach(r => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `<span>${r.item.Name}</span><small style="color:#666">${r.item.Series}</small>`;
                        div.onclick = () => { submitGuess(r.item); dropdown.style.display = 'none'; input.value = ''; };
                        dropdown.appendChild(div);
                    });
                } else dropdown.style.display = 'none';
            });
        }

        async function submitGuess(charObj) {
            if (gameOver) return;
            guesses.push(charObj);
            document.getElementById('guess-counter').innerText = `Guess ${guesses.length} of 10`;
            
            // UPDATED: Now uses charObj.ID for the Jikan API endpoint
            let img = '';
            try {
                if (charObj.ID) {
                    const resp = await fetch(`https://api.jikan.moe/v4/characters/${charObj.ID}`);
                    const data = await resp.json();
                    if (data.data?.images?.jpg?.image_url) {
                        img = data.data.images.jpg.image_url;
                    }
                } else {
                    img = 'https://via.placeholder.com/50/222/fff?text=?';
                }
            } catch(e) { 
                console.warn("Image fetch error:", e);
                img = 'https://via.placeholder.com/50/222/fff?text=?'; 
            }

            renderCard(charObj, img);

            if (charObj.Name.toLowerCase() === secretChar.Name.toLowerCase()) endGame(true);
            else if (guesses.length >= 10) endGame(false);
        }

        function renderCard(guess, img) {
            const grid = document.getElementById('gameGrid');
            const card = document.createElement('div');
            card.className = 'char-card';
            
            const cols = ["Series", "Age", "Height", "Sex", "Hair", "Eyes"];
            let attrHtml = cols.map(key => {
                let status = '';
                let val = guess[key];
                
                if (val.toLowerCase() === secretChar[key].toLowerCase()) {
                    status = 'green';
                } else if ((key === 'Age' || key === 'Height') && Math.abs(parseInt(val) - parseInt(secretChar[key])) <= 15) {
                    status = 'yellow';
                }
                
                // Add arrows for numbers
                if ((key === 'Age' || key === 'Height') && status !== 'green') {
                    val += parseInt(val) < parseInt(secretChar[key]) ? " ↑" : " ↓";
                }

                return `<div class="attr-box ${status}"><span class="attr-label">${key}</span><span class="attr-val">${val}</span></div>`;
            }).join('');

            card.innerHTML = `
                <div class="char-header">
                    <img src="${img}" class="char-thumb">
                    <div class="char-name">${guess.Name}</div>
                </div>
                <div class="attr-grid">${attrHtml}</div>
            `;
            grid.prepend(card);
        }

        function endGame(won) {
            gameOver = true;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('status-area').style.display = 'block';
            document.getElementById('status-msg').innerText = won ? "VICTORY!" : "DEFEAT";
            document.getElementById('status-msg').style.color = won ? 'var(--green)' : 'var(--red)';
            document.getElementById('stats-msg').innerText = `Target: ${secretChar.Name} (${secretChar.Series})`;
        }

        function share() {
            let text = `Scoutdle ${gameMode.toUpperCase()}\n`;
            text += `Guesses: ${guesses.length}/10\n\n`;
            text += "https://scoutdle.vercel.app";
            navigator.clipboard.writeText(text).then(() => alert("Results copied!"));
        }

        window.onload = init;
    </script>
</body>
</html>
